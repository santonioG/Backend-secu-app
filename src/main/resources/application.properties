spring.application.name=backend

# Mantiene los cambios de esquema explícitos fuera de los experimentos locales.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/backend_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:back_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuraciones predeterminadas más seguras para entornos de ejecución
spring.jpa.open-in-view=false
logging.level.org.springframework.web=info
logging.level.org.hibernate=warn
logging.level.com=info
logging.file.name=backend.log
server.port=${SERVER_PORT:8080}
# El JWT debe provenir del entorno en lugar de un secreto de respaldo embebido.
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.security.jwt-secret=${JWT_SECRET:}
app.security.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Configuración SMTP utilizada por el remitente de correo de facturas personalizado.
app.mail.host=${MAIL_HOST:}
app.mail.port=${MAIL_PORT:25}
app.mail.username=${MAIL_USERNAME:}
app.mail.password=${MAIL_PASSWORD:}
app.mail.smtp-auth=${MAIL_SMTP_AUTH:false}
app.mail.starttls=${MAIL_STARTTLS:false}
app.mail.from=${MAIL_FROM:no-reply@example.com}
